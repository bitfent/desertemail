# DesertEmail configuration (hand-parsed, keep simple)

# Domains this server accepts mail for (MX should point here)
domains = ["example.com", "mail.example.com"]

# Where to store Maildirs (absolute path recommended)
data_dir = "./data"

# Listen addresses. Use high ports if not root, then port-forward or use authbind/setcap.
smtp_listen = "0.0.0.0:2525"          # inbound SMTP (real: 25)
submission_listen = "0.0.0.0:2587"    # submission (real: 587)
imap_listen = "0.0.0.0:2143"          # IMAP (real: 143)

# Optional smarthost for sending (if you can't do direct MX or port 25 blocked)
# smarthost = "smtp.gmail.com:587"
# smarthost_user = "you@gmail.com"
# smarthost_pass = "app-password"

# Catch-all: accept ANY local-part@domain and auto-create mailbox under data_dir/<local>
# This affects MAIL ROUTING only — not authentication. Auth always needs a [users] entry
# (unless allow_default_password_auth is explicitly enabled).
catch_all = true

# Used only when allow_default_password_auth = true (default false — leave it false).
# Prefer a hashed value from: desertemail --hash-password
default_password = "changeme"
# OPT-IN backdoor: if true, unknown usernames can authenticate with default_password.
# Keep false in any real deployment.
allow_default_password_auth = false

# --- Auth brute-force lockout (SMTP AUTH / IMAP LOGIN / webmail) ---
auth_max_failures = 10       # failures within window before lockout
auth_window_secs = 300       # sliding window (5 minutes)
auth_lockout_secs = 900      # lockout duration (15 minutes)

# --- Connection limits / DoS resistance ---
max_connections = 512        # global concurrent connections (all protocols)
max_connections_per_ip = 20  # per client IP
io_timeout_secs = 120        # socket idle read/write timeout (slowloris)

# --- Relay / loop / abuse ---
max_received_hops = 30                 # drop inbound DATA with more Received: headers
outbound_max_rcpts_per_hour = 200      # per authenticated user (submission)

# --- Inbound trust & deliverability (Tier 2; all permissive by default) ---
# Always evaluate SPF/DKIM/DMARC and add Authentication-Results + Received-SPF.
# Enforcement is opt-in so a misconfigured check never silently blackholes mail.
spf_enforce = false          # true: SPF Fail + DMARC reject policy => 550
dmarc_enforce = false        # true: honor p=reject (550) / p=quarantine (tag only)
greylist = false             # true: 451 first sight of (ip/24, from, rcpt) triplet
greylist_delay_secs = 60     # wait before accepting retry
greylist_ttl_secs = 2592000  # whitelist TTL after success (30 days)
# dnsbls = ["zen.spamhaus.org", "bl.spamcop.net"]
dnsbls = []
dnsbl_reject = false         # true: single DNSBL hit => 550 (harsh; keep false)
spam_score_tag = 5           # score >= this => X-Spam-Flag: YES (0 disables tagging)
spam_score_reject = 0        # score >= this => 550; 0 = reject disabled
spam_check_ptr = true        # include missing/mismatched rDNS in spam score

# Optional DKIM signing for outbound mail (rsa-sha256, relaxed/relaxed).
# Generate a key: openssl genrsa -out dkim.pem 2048
# Publish DNS:    desertemail --dkim-dns example.com
# dkim_selector = "mail"
# dkim_key_file = "dkim.pem"

# Webmail + admin UI (HTTP/1.1, pure std). Empty string disables.
web_listen = "0.0.0.0:8080"
# Login name that may access /admin. Leave unset or empty to disable admin.
# admin_user = "postmaster"
# Optional: allow remote first-run setup (empty [users]) via /setup?setup_token=...
# Without this, /setup is only reachable from loopback (127.0.0.1 / ::1).
# setup_token = "change-me-long-random"

# --- TLS (optional) ---
# Both paths set => STARTTLS on SMTP/IMAP and optional implicit-TLS listeners.
# Generate a self-signed cert for testing:
#   openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#     -subj "/CN=mail.example.com" -keyout tls.key -out tls.crt
# tls_cert_file = "tls.crt"
# tls_key_file = "tls.key"
# Implicit TLS listeners (only bound when non-empty AND TLS cert/key loaded):
# smtps_listen = "0.0.0.0:465"      # SMTP submission over TLS
# imaps_listen = "0.0.0.0:993"      # IMAP over TLS
# web_tls_listen = "0.0.0.0:8443"   # HTTPS webmail
# If true, AUTH on plaintext SMTP is rejected with 538 (default false).
# require_tls_for_auth = false

# --- Quotas (Tier 3) ---
# Default mailbox size limit in MiB (0 = unlimited). Checked on inbound SMTP
# delivery (452 4.2.2 Mailbox full) and IMAP APPEND (NO [OVERQUOTA]).
default_quota_mb = 0
# Per-user overrides (MiB):
# [quotas]
# "alice" = 512

# --- Structured logging ---
# "text" (default) or "json" — one JSON object per line with ts/level/msg/fields.
# Auth failures emit event=auth_fail ip=... user=... for fail2ban (see deploy/).
log_format = "text"

# --- Message size / metrics (Tier 4) ---
# Max SMTP DATA / IMAP APPEND size in bytes (default 25 MiB). Oversize => SMTP 552 / IMAP NO.
max_message_bytes = 26214400
# If set, GET /metrics requires Authorization: Bearer <token> or ?token=
# metrics_token = "change-me"

# --- ACME / Let's Encrypt auto TLS (Tier 3) ---
# When true, obtains/renews certs via ACME HTTP-01. Requires:
#   - tls_cert_file + tls_key_file paths set (written by ACME)
#   - web_listen reachable on port 80 for HTTP-01 (or reverse-proxy that path)
#   - public DNS for acme_domains pointing at this host
# Does NOT block startup; runs in a background thread. On failure, continues
# with any existing cert (or plaintext). Renews when <30 days remain (check every 12h).
# Test against staging first:
#   acme_directory = "https://acme-staging-v02.api.letsencrypt.org/directory"
acme = false
# acme_email = "admin@example.com"
# acme_directory = "https://acme-v02.api.letsencrypt.org/directory"
# acme_domains = ["mail.example.com"]   # default = domains

[users]
# local-part or full address = password or pbkdf2 hash
# Generate a hash:  desertemail --hash-password
#   "alice" = "pbkdf2_sha256$210000$....$...."
# Plaintext still works for migration but logs a startup WARNING.
"alice" = "alicepass"
"bob" = "bobpass"
"postmaster" = "adminpass"

# [quotas]
# "alice" = 512

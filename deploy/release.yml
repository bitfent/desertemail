# Build static binaries and commit them into bin-dist/ (served by the Render site under /bin/).
# No GitHub Releases — binaries ship via the repo + static site only.
#
# Trigger: push a tag matching v* (e.g. git tag v0.1.0 && git push origin v0.1.0)
#          or workflow_dispatch from the Actions UI.
#
# Artifact naming (must match installers + site-build.sh):
#   desertemail-<target>
#
# This file lives at deploy/release.yml. GitHub only runs workflows from
# .github/workflows/ — activate once via the web UI (see DEPLOY.md).

name: Build binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          # ARMv6 (Pi Zero / Pi 1) — armv7 binaries are illegal instructions there
          - arm-unknown-linux-musleabihf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          set -eu
          TARGET="${{ matrix.target }}"
          BIN="target/${TARGET}/release/desertemail"
          NAME="desertemail-${TARGET}"

          if [ ! -f "${BIN}" ]; then
            echo "error: binary not found at ${BIN}" >&2
            exit 1
          fi

          # Prefer multi-arch strip; release profile also strips via Cargo.toml.
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip -s "${BIN}" || true
          else
            strip "${BIN}" 2>/dev/null || true
          fi

          cp "${BIN}" "${NAME}"
          ls -la "${NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: desertemail-${{ matrix.target }}
          if-no-files-found: error

  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          set -eu
          TARGET="${{ matrix.target }}"
          BIN="target/${TARGET}/release/desertemail"
          NAME="desertemail-${TARGET}"

          if [ ! -f "${BIN}" ]; then
            echo "error: binary not found at ${BIN}" >&2
            exit 1
          fi

          strip -x "${BIN}" 2>/dev/null || strip "${BIN}" 2>/dev/null || true

          cp "${BIN}" "${NAME}"
          ls -la "${NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: desertemail-${{ matrix.target }}
          if-no-files-found: error

  build-windows:
    name: Windows x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "target/x86_64-pc-windows-msvc/release/desertemail.exe"
          $name = "desertemail-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "binary not found at $bin"
            exit 1
          }
          Copy-Item $bin $name
          Get-Item $name | Format-List Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-msvc
          path: desertemail-x86_64-pc-windows-msvc.exe
          if-no-files-found: error

  publish-bin-dist:
    name: Commit binaries to bin-dist/
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a token that can push back to the default branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy into bin-dist/ and commit
        run: |
          set -eu
          ls -la dist || true

          # Stage artifacts aside first — we may switch branches below.
          STAGING=$(mktemp -d)
          find dist -type f -name 'desertemail-*' -print | while IFS= read -r f; do
            base=$(basename "${f}")
            cp "${f}" "${STAGING}/${base}"
            echo "collected ${base}"
          done
          ls -la "${STAGING}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Tag builds leave a detached HEAD; always land binaries on the default branch
          # so Render (watching that branch) redeploys with the new /bin/ assets.
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          if [ -z "${DEFAULT_BRANCH}" ]; then
            DEFAULT_BRANCH=main
          fi
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          mkdir -p bin-dist
          cp "${STAGING}"/desertemail-* bin-dist/
          ls -la bin-dist

          git add bin-dist
          # Guard against empty diffs (no binary changes)
          if git diff --cached --quiet; then
            echo "No changes to bin-dist/; nothing to commit."
          else
            git commit -m "CI: update prebuilt binaries"
            git push origin "HEAD:${DEFAULT_BRANCH}"
            echo "Pushed bin-dist/ to ${DEFAULT_BRANCH}"
          fi

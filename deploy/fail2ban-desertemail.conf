# fail2ban filter for DesertEmail auth failures.
#
# Install:
#   sudo cp deploy/fail2ban-desertemail.conf /etc/fail2ban/filter.d/desertemail.conf
#   # then add a jail (see docs or jail snippet below)
#
# Matches both text and json structured log lines that carry event=auth_fail
# (or the JSON equivalent "event":"auth_fail").

[Definition]
failregex = ^.*\[warn\].*event=auth_fail\s+ip=<HOST>.*$
            ^.*\{"ts":\d+,"level":"warn".*"event":"auth_fail".*"ip":"<HOST>".*$
            ^.*auth.?fail.*ip[=: ]+<HOST>.*$
ignoreregex =

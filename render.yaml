# DesertEmail static landing site (Render Blueprint)
#
# How to connect:
#   1. Push this repo to GitHub.
#   2. In the Render dashboard: New → Blueprint → select this repository.
#   3. Optionally set SITE_BASE_URL if RENDER_EXTERNAL_URL is not enough
#      (Render sets RENDER_EXTERNAL_URL automatically on most plans).
#   4. Render creates the static site service defined below and deploys on each push.
#
# Binaries are served from this site under /bin/ (copied from bin-dist/ at build).
# Per-platform installers are generated by site-build.sh into site/install-*.sh.
#
# After deploy, users pick a platform on the landing page and run:
#   curl -fsSL https://<your-render-host>/install-<platform>.sh | sh

services:
  - type: web
    name: desertemail-site
    runtime: static
    buildCommand: sh site-build.sh
    staticPublishPath: site
    headers:
      # Per-platform installers (generated)
      - path: /install-linux-x86_64.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-linux-arm64.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-linux-armv7.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-linux-armv6.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-macos-apple-silicon.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-macos-intel.sh
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /install-from-source.sh
        name: Content-Type
        value: text/plain; charset=utf-8
